# ===============================
# Reproducibility
# ===============================
seed_base: 42
num_seeds: 10

# ===============================
# Environment
# ===============================
# 8x8 grid world with three staggered obstacle rows that form a
# natural maze, forcing non-trivial navigation.  The stochastic
# transition noise tests algorithm robustness under uncertainty.
#
# Grid layout (. = free, X = obstacle, S = start, G = goal):
#   S . . . . . . .
#   . . . . . . . .
#   . X X X X X . .   <- row 2, cols 1-5
#   . . . . . . . .
#   . . . X X X X .   <- row 4, cols 3-6
#   . . . . . . . .
#   . X X X . . . .   <- row 6, cols 1-3
#   . . . . . . . G
env:
  grid_size: 8
  max_steps: 200
  noise: 0.1            # prob. of random action overriding intended action
  obstacle_reward: -0.5
  step_reward: -0.01
  wall_penalty: -0.05
  goal_reward: 1.0
  obstacles:
    - [2, 1]
    - [2, 2]
    - [2, 3]
    - [2, 4]
    - [2, 5]
    - [4, 3]
    - [4, 4]
    - [4, 5]
    - [4, 6]
    - [6, 1]
    - [6, 2]
    - [6, 3]

# ===============================
# Training
# ===============================
training:
  num_episodes: 500

# ===============================
# Hyperparameter Sweep
# ===============================
hyperparameters:
  learning_rates:    [0.001, 0.01, 0.1]
  discount_factors:  [0.9, 0.99]

# ===============================
# DQN
# ===============================
dqn:
  hidden_dim:         64
  buffer_size:        5000
  batch_size:         64
  epsilon_start:      1.0
  epsilon_end:        0.05
  epsilon_decay:      0.995
  target_update_freq: 20

# ===============================
# REINFORCE
# ===============================
reinforce:
  hidden_dim: 64

# ===============================
# Logging
# ===============================
logging:
  save_logs:        true
  save_checkpoints: true
